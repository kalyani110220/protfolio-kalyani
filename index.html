<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Responsive Web Page</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- Header -->
<header>
    <h1>My Responsive Page</h1>
    <nav>
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Services</a>
        <a href="#">Contact</a>
    </nav>
</header>

<!-- Main content -->
<main class="container">

    <!-- Grid layout -->
    <section class="content">
        <article>
            <h2>Main Article</h2>
            <p>This is the main content area. You can write anything here.</p>
        </article>
        <aside>
            <h2>Sidebar</h2>
            <p>This is the sidebar content. Links, ads, or widgets go here.</p>
        </aside>
    </section>

    <!-- Flexbox section -->
    <section class="cards">
        <div class="card">Card 1</div>
        <div class="card">Card 2</div>
        <div class="card">Card 3</div>
    </section>

</main>

<!-- Footer -->
<footer>
    <p>© 2026 My Responsive Webpage</p>
</footer>

</body>
</html>
